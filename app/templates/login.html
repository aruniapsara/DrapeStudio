<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — DrapeStudio</title>
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            corePlugins: { preflight: false },
            theme: {
                extend: {
                    colors: {
                        primary: '#6C3CE1',
                        'primary-dark': '#5A2FBF',
                        dark:    '#1A1A2E',
                        surface: '#F8F7FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #1A1A2E 0%, #2D1B69 50%, #1A1A2E 100%);
        }
    </style>
</head>
<body class="h-full gradient-bg flex items-center justify-center p-4">

    <div class="w-full max-w-sm">
        {# Logo #}
        <div class="text-center mb-8">
            <img src="/static/logo.png" alt="DrapeStudio" class="h-14 w-auto mx-auto mb-3">
            <p class="text-white/60 text-sm">AI-powered garment model images</p>
        </div>

        {# Card #}
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <h1 class="text-xl font-bold text-[#1A1A2E] mb-1">Welcome back</h1>
            <p class="text-gray-500 text-sm mb-6">Sign in to your account to continue</p>

            {% if error %}
            <div class="mb-5 flex items-start gap-2.5 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
                <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                           value="{{ username or '' }}"
                           placeholder="Enter your username"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#6C3CE1]/30 focus:border-[#6C3CE1] transition-colors">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Enter your password"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#6C3CE1]/30 focus:border-[#6C3CE1] transition-colors">
                </div>

                <button type="submit"
                        class="w-full bg-[#6C3CE1] hover:bg-[#5A2FBF] text-white font-semibold py-3 rounded-xl transition-colors text-sm shadow-sm mt-2">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-white/40 text-xs mt-6">&copy; 2026 DrapeStudio</p>
    </div>

</body>
</html>
