<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — DrapeStudio</title>
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #2D1B69 50%, #1A1A2E 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #fff;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        /* CSS-only animated cloud illustration */
        .cloud-wrap {
            position: relative;
            width: 120px;
            height: 80px;
            margin: 0 auto 2rem;
        }
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
        }
        .cloud-main {
            width: 90px; height: 36px;
            bottom: 0; left: 15px;
        }
        .cloud-top {
            width: 50px; height: 50px;
            bottom: 20px; left: 30px;
            border-radius: 50%;
        }
        .cloud-left {
            width: 36px; height: 36px;
            bottom: 14px; left: 12px;
            border-radius: 50%;
        }

        /* Animated lightning bolt */
        .lightning {
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            animation: flash 2s ease-in-out infinite;
        }
        @keyframes flash {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Floating dots to suggest offline state */
        .dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p  { font-size: 0.9rem; color: rgba(255,255,255,0.6); line-height: 1.6; }
        .info-box {
            background: rgba(108,60,225,0.2);
            border: 1px solid rgba(108,60,225,0.4);
            border-radius: 1rem;
            padding: 0.875rem 1rem;
            margin: 1.5rem 0;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            text-align: left;
        }
        .info-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #6C3CE1;
            color: #fff;
            border: none;
            border-radius: 0.875rem;
            padding: 0.75rem 1.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .btn-retry:hover { background: #5A2FBF; }

        footer { margin-top: 2rem; font-size: 0.7rem; color: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

<div class="card">
    <!-- CSS-only cloud illustration -->
    <div class="cloud-wrap">
        <div class="cloud cloud-main"></div>
        <div class="cloud cloud-top"></div>
        <div class="cloud cloud-left"></div>
        <svg class="lightning" width="18" height="28" viewBox="0 0 18 28" fill="none">
            <path d="M10 0L2 16h7L5 28l11-16H9L10 0z" fill="rgba(255,193,7,0.8)"/>
        </svg>
    </div>

    <h1>You're Offline</h1>
    <p>It looks like your internet connection is unavailable.</p>

    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="info-box">
        <span class="info-icon">🔄</span>
        <span>Your queued uploads will sync automatically when you're back online.</span>
    </div>

    <button class="btn-retry" onclick="location.reload()">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Try Again
    </button>
</div>

<footer>&copy; 2026 DrapeStudio</footer>

</body>
</html>
