version: "3.9"

# Production Docker Compose for DrapeStudio
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Set all env vars in .env (APP_ENV=production, DATABASE_URL=postgresql://..., etc.)
#   - SSL certificates in ./certs/ (cert.pem + key.pem) or use Let's Encrypt via nginx

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build: .
    restart: always
    command: >
      sh -c "mkdir -p /app/data/storage/uploads /app/data/storage/outputs /app/data/db &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    env_file: .env
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: "sqlite:////app/data/db/drapestudio.db"
      STORAGE_ROOT: "/app/data/storage"
    volumes:
      - storage_data:/app/data/storage
      - db_data:/app/data/db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── RQ Workers (2 replicas) ─────────────────────────────────────────────────
  worker:
    build: .
    restart: always
    command: >
      sh -c "mkdir -p /app/data/storage/uploads /app/data/storage/outputs /app/data/db &&
             rq worker drapestudio --url redis://redis:6379"
    env_file: .env
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: "sqlite:////app/data/db/drapestudio.db"
      STORAGE_ROOT: "/app/data/storage"
    volumes:
      - storage_data:/app/data/storage
      - db_data:/app/data/db
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  storage_data:
  db_data:
