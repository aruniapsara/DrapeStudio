version: "v0.1"

# MANDATORY — injected into every adult prompt. Not overridable by user input.
sri_lankan_identity: >
  The model is a Sri Lankan person with authentic Sri Lankan facial features,
  bone structure, and appearance. The model looks naturally Sri Lankan -
  not Indian, not Southeast Asian, not European. The face should reflect
  the diverse but distinctly Sri Lankan appearance common in the island.
  Natural Sri Lankan hair texture and style.

product_types:
  clothing: "wearing the clothing/garment shown in the reference image(s)"
  accessories: "styled with the accessory shown in the reference image(s)"

quality: |
  photorealistic, ecommerce/catalogue quality
  accurate garment drape and fit; preserve garment patterns and colours exactly
  natural anatomy; realistic hands with correct finger count; sharp focus on garment
  commercial catalogue lighting; clean professional result
  remove all visible price tags, swing tags, care labels, and brand labels from the garment
  exactly one person in the image — single model only

output: |
  generate one image per call at the camera angle specified at the end of this prompt
  model face must always be visible regardless of camera angle
  high resolution output; no text overlays; no watermarks; no borders

negative: |
  extra limbs, extra fingers, fused fingers, distorted hands, distorted face
  background text, watermarks, logos, lens flare, motion blur
  NSFW content, revealing clothing added, garment colour changes
  price tags, swing tags, care labels, brand tags, garment labels, hang tags
  multiple people, two people, group of people, crowd, extra person

